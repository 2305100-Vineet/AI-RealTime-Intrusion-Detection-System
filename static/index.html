<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI IDS SOC</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚡ AI Intrusion Detection - SOC Command Center</h1>

<div class="grid">

<div class="card">
<h3>Status</h3>
<p id="threat">Waiting...</p>
</div>

<div class="card">
<h3>Risk Score</h3>
<div class="progress">
<div id="bar"></div>
</div>
<p id="risk">0%</p>
</div>

<div class="card">
<h3>Traffic</h3>
<p id="traffic">0 packets</p>
</div>

</div>

<div class="section">
<h2>Live Events</h2>
<table>
<thead>
<tr><th>Time</th><th>Status</th><th>Risk</th><th>Severity</th></tr>
</thead>
<tbody id="events"></tbody>
</table>
</div>

<div class="section">
<h2>Global Threat Map</h2>
<div id="map"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet/dist/leaflet.css"/>

<script src="script.js"></script>

</body>
</html>
